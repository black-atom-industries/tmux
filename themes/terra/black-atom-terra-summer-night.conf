# Theme: Black Atom — TERRA ∷ Summer Night
# Appearance: dark
# Collection: Terra

# Status bar
set -g status-style fg=#a0a27e,bg=#0a1a10
set -g status-left-style fg=#bab06f,bg=#0a1a10
set -g status-right-style fg=#a0a27e,bg=#0a1a10

# Window status
set-window-option -g window-status-style fg=#a0a27e
set-window-option -g window-status-current-style fg=#bab06f,bold
set-window-option -g window-status-activity-style fg=#7dac86,bold
set-window-option -g window-status-bell-style fg=#7dac86,bold

# Pane borders
set -g pane-border-style fg=#a0a27e
set -g pane-active-border-style fg=#bab06f

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#a0a27e
set -g window-active-style fg=#dfcbaa

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#bab06f]●,#[fg=#a0a27e]○}"

# Session switcher & copy mode
set -g mode-style fg=#bab06f,bg=#152318

# Messages & command prompt - minimal style
set -g message-style fg=#7dac86,bg=#0a1a10,bold
set -g message-command-style fg=#bab06f,bg=#0a1a10

# Display panes
set -g display-panes-active-colour "#bab06f"
set -g display-panes-colour "#a0a27e"
