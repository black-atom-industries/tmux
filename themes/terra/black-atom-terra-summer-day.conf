# Theme: Black Atom — TERRA ∷ Summer Day
# Appearance: light
# Collection: Terra

# Status bar
set -g status-style fg=#26541c,bg=#f7e9d6
set -g status-left-style fg=#c67b36,bg=#f7e9d6
set -g status-right-style fg=#26541c,bg=#f7e9d6

# Window status
set-window-option -g window-status-style fg=#26541c
set-window-option -g window-status-current-style fg=#c67b36,bold
set-window-option -g window-status-activity-style fg=#5a8f65,bold
set-window-option -g window-status-bell-style fg=#5a8f65,bold

# Pane borders
set -g pane-border-style fg=#26541c
set -g pane-active-border-style fg=#c67b36

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#26541c
set -g window-active-style fg=#00280f

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#c67b36]●,#[fg=#26541c]○}"

# Session switcher & copy mode
set -g mode-style fg=#c67b36,bg=#e4dec8

# Messages & command prompt - minimal style
set -g message-style fg=#5a8f65,bg=#f7e9d6,bold
set -g message-command-style fg=#c67b36,bg=#f7e9d6

# Display panes
set -g display-panes-active-colour "#c67b36"
set -g display-panes-colour "#26541c"
