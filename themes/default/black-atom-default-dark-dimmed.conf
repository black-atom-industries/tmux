# Theme: Black Atom — Dark Dimmed
# Appearance: dark
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#7b8187,bg=#20252a
set -g status-left-style fg=#4ec983,bg=#20252a
set -g status-right-style fg=#7b8187,bg=#20252a

# Window status
set-window-option -g window-status-style fg=#7b8187
set-window-option -g window-status-current-style fg=#4ec983,bold
set-window-option -g window-status-activity-style fg=#00b9c3,bold
set-window-option -g window-status-bell-style fg=#00b9c3,bold

# Pane borders
set -g pane-border-style fg=#7b8187
set -g pane-active-border-style fg=#4ec983

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#7b8187
set -g window-active-style fg=#e4eeea

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#4ec983]●,#[fg=#7b8187]○}"

# Session switcher & copy mode
set -g mode-style fg=#4ec983,bg=#2e3339

# Messages & command prompt - minimal style
set -g message-style fg=#00b9c3,bg=#20252a,bold
set -g message-command-style fg=#4ec983,bg=#20252a

# Display panes
set -g display-panes-active-colour "#4ec983"
set -g display-panes-colour "#7b8187"
