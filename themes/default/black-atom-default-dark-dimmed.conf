# Theme: Black Atom — Dark Dimmed
# Appearance: dark
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#72857e,bg=#172822
set -g status-left-style fg=#25c9a9,bg=#172822
set -g status-right-style fg=#72857e,bg=#172822

# Window status
set-window-option -g window-status-style fg=#72857e
set-window-option -g window-status-current-style fg=#25c9a9,bold
set-window-option -g window-status-activity-style fg=#00b9c3,bold
set-window-option -g window-status-bell-style fg=#00b9c3,bold

# Pane borders
set -g pane-border-style fg=#72857e
set -g pane-active-border-style fg=#25c9a9

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#72857e
set -g window-active-style fg=#dcf1e9

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#25c9a9]●,#[fg=#72857e]○}"

# Session switcher & copy mode
set -g mode-style fg=#25c9a9,bg=#263731

# Messages & command prompt - minimal style
set -g message-style fg=#00b9c3,bg=#172822,bold
set -g message-command-style fg=#25c9a9,bg=#172822

# Display panes
set -g display-panes-active-colour "#25c9a9"
set -g display-panes-colour "#72857e"
