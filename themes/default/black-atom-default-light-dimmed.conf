# Theme: Black Atom — Light Dimmed
# Appearance: light
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#5c6b76,bg=#e4e6e8
set -g status-left-style fg=#50a648,bg=#e4e6e8
set -g status-right-style fg=#5c6b76,bg=#e4e6e8

# Window status
set-window-option -g window-status-style fg=#5c6b76
set-window-option -g window-status-current-style fg=#50a648,bold
set-window-option -g window-status-activity-style fg=#00839a,bold
set-window-option -g window-status-bell-style fg=#00839a,bold

# Pane borders
set -g pane-border-style fg=#5c6b76
set -g pane-active-border-style fg=#50a648

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#5c6b76
set -g window-active-style fg=#313334

# Pane status bar
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#50a648]●,#[fg=#5c6b76]○}"

# Session switcher & copy mode
set -g mode-style fg=#50a648,bg=#f5f7f9

# Messages & command prompt - minimal style
set -g message-style fg=#00839a,bg=#eef0f2,bold
set -g message-command-style fg=#50a648,bg=#eef0f2

# Display panes
set -g display-panes-active-colour "#50a648"
set -g display-panes-colour "#5c6b76"
