# Theme: Black Atom — Light Dimmed
# Appearance: light
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#595e64,bg=#d8dfe6
set -g status-left-style fg=#2eaf6b,bg=#d8dfe6
set -g status-right-style fg=#595e64,bg=#d8dfe6

# Window status
set-window-option -g window-status-style fg=#595e64
set-window-option -g window-status-current-style fg=#2eaf6b,bold
set-window-option -g window-status-activity-style fg=#00abc1,bold
set-window-option -g window-status-bell-style fg=#00abc1,bold

# Pane borders
set -g pane-border-style fg=#595e64
set -g pane-active-border-style fg=#2eaf6b

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#595e64
set -g window-active-style fg=#20252a

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#2eaf6b]●,#[fg=#595e64]○}"

# Session switcher & copy mode
set -g mode-style fg=#2eaf6b,bg=#e5ecf3

# Messages & command prompt - minimal style
set -g message-style fg=#00abc1,bg=#d8dfe6,bold
set -g message-command-style fg=#2eaf6b,bg=#d8dfe6

# Display panes
set -g display-panes-active-colour "#2eaf6b"
set -g display-panes-colour "#595e64"
