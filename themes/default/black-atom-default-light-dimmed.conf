# Theme: Black Atom — Light Dimmed
# Appearance: light
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#55615c,bg=#d5e2dc
set -g status-left-style fg=#00b290,bg=#d5e2dc
set -g status-right-style fg=#55615c,bg=#d5e2dc

# Window status
set-window-option -g window-status-style fg=#55615c
set-window-option -g window-status-current-style fg=#00b290,bold
set-window-option -g window-status-activity-style fg=#00abc1,bold
set-window-option -g window-status-bell-style fg=#00abc1,bold

# Pane borders
set -g pane-border-style fg=#55615c
set -g pane-active-border-style fg=#00b290

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#55615c
set -g window-active-style fg=#1d2722

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#00b290]●,#[fg=#55615c]○}"

# Session switcher & copy mode
set -g mode-style fg=#00b290,bg=#e2efe9

# Messages & command prompt - minimal style
set -g message-style fg=#00abc1,bg=#d5e2dc,bold
set -g message-command-style fg=#00b290,bg=#d5e2dc

# Display panes
set -g display-panes-active-colour "#00b290"
set -g display-panes-colour "#55615c"
