# Theme: Black Atom — Light
# Appearance: light
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#51606b,bg=#f5f7f9
set -g status-left-style fg=#60a259,bg=#f5f7f9
set -g status-right-style fg=#51606b,bg=#f5f7f9

# Window status
set-window-option -g window-status-style fg=#51606b
set-window-option -g window-status-current-style fg=#60a259,bold
set-window-option -g window-status-activity-style fg=#00839a,bold
set-window-option -g window-status-bell-style fg=#00839a,bold

# Pane borders
set -g pane-border-style fg=#51606b
set -g pane-active-border-style fg=#60a259

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#51606b
set -g window-active-style fg=#28292a

# Pane status bar
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#60a259]●,#[fg=#51606b]○}"

# Session switcher & copy mode
set -g mode-style fg=#60a259,bg=#fcfeff

# Messages & command prompt - minimal style
set -g message-style fg=#00839a,bg=#f5f7f9,bold
set -g message-command-style fg=#60a259,bg=#f5f7f9

# Display panes
set -g display-panes-active-colour "#60a259"
set -g display-panes-colour "#51606b"
