# Theme: Black Atom — Light
# Appearance: light
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#43484e,bg=#eff6fd
set -g status-left-style fg=#2eaf6b,bg=#eff6fd
set -g status-right-style fg=#43484e,bg=#eff6fd

# Window status
set-window-option -g window-status-style fg=#43484e
set-window-option -g window-status-current-style fg=#2eaf6b,bold
set-window-option -g window-status-activity-style fg=#00abc1,bold
set-window-option -g window-status-bell-style fg=#00abc1,bold

# Pane borders
set -g pane-border-style fg=#43484e
set -g pane-active-border-style fg=#2eaf6b

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#43484e
set -g window-active-style fg=#0e1217

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#2eaf6b]●,#[fg=#43484e]○}"

# Session switcher & copy mode
set -g mode-style fg=#2eaf6b,bg=#f6fdff

# Messages & command prompt - minimal style
set -g message-style fg=#00abc1,bg=#eff6fd,bold
set -g message-command-style fg=#2eaf6b,bg=#eff6fd

# Display panes
set -g display-panes-active-colour "#2eaf6b"
set -g display-panes-colour "#43484e"
