# Theme: Black Atom — Light
# Appearance: light
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#576570,bg=#eceff1
set -g status-left-style fg=#60a259,bg=#eceff1
set -g status-right-style fg=#576570,bg=#eceff1

# Window status
set-window-option -g window-status-style fg=#576570
set-window-option -g window-status-current-style fg=#60a259,bold
set-window-option -g window-status-activity-style fg=#00839a,bold
set-window-option -g window-status-bell-style fg=#00839a,bold

# Pane borders
set -g pane-border-style fg=#576570
set -g pane-active-border-style fg=#60a259

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#576570
set -g window-active-style fg=#28292a

# Pane status bar
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#60a259]●,#[fg=#576570]○}"

# Session switcher & copy mode
set -g mode-style fg=#60a259,bg=#f9fcff

# Messages & command prompt - minimal style
set -g message-style fg=#00839a,bg=#eceff1,bold
set -g message-command-style fg=#60a259,bg=#eceff1

# Display panes
set -g display-panes-active-colour "#60a259"
set -g display-panes-colour "#576570"
