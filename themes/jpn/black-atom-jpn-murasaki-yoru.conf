# Theme: Black Atom — JPN ∷ Murasaki Yoru
# Appearance: dark
# Collection: JPN

# Status bar
set -g status-style fg=#946996,bg=#351b23
set -g status-left-style fg=#dca23a,bg=#351b23
set -g status-right-style fg=#946996,bg=#351b23

# Window status
set-window-option -g window-status-style fg=#946996
set-window-option -g window-status-current-style fg=#dca23a,bold
set-window-option -g window-status-activity-style fg=#8cb6c5,bold
set-window-option -g window-status-bell-style fg=#8cb6c5,bold

# Pane borders
set -g pane-border-style fg=#946996
set -g pane-active-border-style fg=#dca23a

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#946996
set -g window-active-style fg=#d4bfd6

# Pane status bar
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#dca23a]●,#[fg=#946996]○}"

# Session switcher & copy mode
set -g mode-style fg=#dca23a,bg=#452a32

# Messages & command prompt - minimal style
set -g message-style fg=#8cb6c5,bg=#351b23,bold
set -g message-command-style fg=#dca23a,bg=#351b23

# Display panes
set -g display-panes-active-colour "#dca23a"
set -g display-panes-colour "#946996"
