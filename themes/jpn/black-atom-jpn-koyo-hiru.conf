# Theme: Black Atom — JPN ∷ Koyo Hiru
# Appearance: light
# Collection: JPN

# Status bar
set -g status-style fg=#b193b1,bg=#faeede
set -g status-left-style fg=#ea9d34,bg=#faeede
set -g status-right-style fg=#b193b1,bg=#faeede

# Window status
set-window-option -g window-status-style fg=#b193b1
set-window-option -g window-status-current-style fg=#ea9d34,bold
set-window-option -g window-status-activity-style fg=#9175a3,bold
set-window-option -g window-status-bell-style fg=#9175a3,bold

# Pane borders
set -g pane-border-style fg=#b193b1
set -g pane-active-border-style fg=#ea9d34

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#b193b1
set -g window-active-style fg=#3a2e3a

# Pane status bar
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#ea9d34]●,#[fg=#b193b1]○}"

# Session switcher & copy mode
set -g mode-style fg=#ea9d34,bg=#fef2e1

# Messages & command prompt - minimal style
set -g message-style fg=#9175a3,bg=#faeede,bold
set -g message-command-style fg=#ea9d34,bg=#faeede

# Display panes
set -g display-panes-active-colour "#ea9d34"
set -g display-panes-colour "#b193b1"
