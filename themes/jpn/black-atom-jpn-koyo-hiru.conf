# Theme: Black Atom — JPN ∷ Koyo Hiru
# Appearance: light
# Collection: JPN

# Status bar
set -g status-style fg=#b19b7c,bg=#fef2e1
set -g status-left-style fg=#ed9a00,bg=#fef2e1
set -g status-right-style fg=#b19b7c,bg=#fef2e1

# Window status
set-window-option -g window-status-style fg=#b19b7c
set-window-option -g window-status-current-style fg=#ed9a00,bold
set-window-option -g window-status-activity-style fg=#9e77dc,bold
set-window-option -g window-status-bell-style fg=#9e77dc,bold

# Pane borders
set -g pane-border-style fg=#b19b7c
set -g pane-active-border-style fg=#ed9a00

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#b19b7c
set -g window-active-style fg=#3a2e3b

# Pane status bar
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#ed9a00]●,#[fg=#b19b7c]○}"

# Session switcher & copy mode
set -g mode-style fg=#ed9a00,bg=#fff5e5

# Messages & command prompt - minimal style
set -g message-style fg=#9e77dc,bg=#fef2e1,bold
set -g message-command-style fg=#ed9a00,bg=#fef2e1

# Display panes
set -g display-panes-active-colour "#ed9a00"
set -g display-panes-colour "#b19b7c"
