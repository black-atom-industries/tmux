# Theme: Black Atom — JPN ∷ Koyo Yoru
# Appearance: dark
# Collection: JPN

# Status bar
set -g status-style fg=#b19b7c,bg=#261a2a
set -g status-left-style fg=#e49e22,bg=#261a2a
set -g status-right-style fg=#b19b7c,bg=#261a2a

# Window status
set-window-option -g window-status-style fg=#b19b7c
set-window-option -g window-status-current-style fg=#e49e22,bold
set-window-option -g window-status-activity-style fg=#b5a4d7,bold
set-window-option -g window-status-bell-style fg=#b5a4d7,bold

# Pane borders
set -g pane-border-style fg=#b19b7c
set -g pane-active-border-style fg=#e49e22

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#b19b7c
set -g window-active-style fg=#ead2b2

# Pane status bar
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#e49e22]●,#[fg=#b19b7c]○}"

# Session switcher & copy mode
set -g mode-style fg=#e49e22,bg=#3a2d3f

# Messages & command prompt - minimal style
set -g message-style fg=#b5a4d7,bg=#261a2a,bold
set -g message-command-style fg=#e49e22,bg=#261a2a

# Display panes
set -g display-panes-active-colour "#e49e22"
set -g display-panes-colour "#b19b7c"
