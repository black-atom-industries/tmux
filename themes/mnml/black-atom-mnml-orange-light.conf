# Theme: Black Atom — MNML ∷ Orange Light
# Appearance: light
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#585f61,bg=#f5f9fb
set -g status-left-style fg=#fc8e06,bg=#f5f9fb
set -g status-right-style fg=#585f61,bg=#f5f9fb

# Window status
set-window-option -g window-status-style fg=#585f61
set-window-option -g window-status-current-style fg=#fc8e06,bold
set-window-option -g window-status-activity-style fg=#00a3e9,bold
set-window-option -g window-status-bell-style fg=#00a3e9,bold

# Pane borders
set -g pane-border-style fg=#585f61
set -g pane-active-border-style fg=#fc8e06

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#585f61
set -g window-active-style fg=#242a2c

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#fc8e06]●,#[fg=#585f61]○}"

# Session switcher & copy mode
set -g mode-style fg=#fc8e06,bg=#fcffff

# Messages & command prompt - minimal style
set -g message-style fg=#00a3e9,bg=#f5f9fb,bold
set -g message-command-style fg=#fc8e06,bg=#f5f9fb

# Display panes
set -g display-panes-active-colour "#fc8e06"
set -g display-panes-colour "#585f61"
