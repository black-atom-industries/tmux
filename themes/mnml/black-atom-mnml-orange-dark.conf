# Theme: Black Atom — MNML ∷ Orange Dark
# Appearance: dark
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#868e90,bg=#030608
set -g status-left-style fg=#fc8e06,bg=#030608
set -g status-right-style fg=#868e90,bg=#030608

# Window status
set-window-option -g window-status-style fg=#868e90
set-window-option -g window-status-current-style fg=#fc8e06,bold
set-window-option -g window-status-activity-style fg=#3a93e6,bold
set-window-option -g window-status-bell-style fg=#3a93e6,bold

# Pane borders
set -g pane-border-style fg=#868e90
set -g pane-active-border-style fg=#fc8e06

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#868e90
set -g window-active-style fg=#f2fafd

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#fc8e06]●,#[fg=#868e90]○}"

# Session switcher & copy mode
set -g mode-style fg=#fc8e06,bg=#090e10

# Messages & command prompt - minimal style
set -g message-style fg=#3a93e6,bg=#030608,bold
set -g message-command-style fg=#fc8e06,bg=#030608

# Display panes
set -g display-panes-active-colour "#fc8e06"
set -g display-panes-colour "#868e90"
