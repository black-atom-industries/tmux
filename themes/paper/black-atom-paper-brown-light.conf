# Theme: Black Atom — PAPER ∷ Brown Light
# Appearance: light
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#777162,bg=#ede4cd
set -g status-left-style fg=#242424,bg=#ede4cd
set -g status-right-style fg=#777162,bg=#ede4cd

# Window status
set-window-option -g window-status-style fg=#777162
set-window-option -g window-status-current-style fg=#242424,bold
set-window-option -g window-status-activity-style fg=#00a3e9,bold
set-window-option -g window-status-bell-style fg=#00a3e9,bold

# Pane borders
set -g pane-border-style fg=#777162
set -g pane-active-border-style fg=#242424

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#777162
set -g window-active-style fg=#201f1c

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#242424]●,#[fg=#777162]○}"

# Session switcher & copy mode
set -g mode-style fg=#242424,bg=#f9f1dd

# Messages & command prompt - minimal style
set -g message-style fg=#00a3e9,bg=#ede4cd,bold
set -g message-command-style fg=#242424,bg=#ede4cd

# Display panes
set -g display-panes-active-colour "#242424"
set -g display-panes-colour "#777162"
