# Theme: Black Atom — PAPER ∷ Brown Light
# Appearance: light
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#7a7062,bg=#f2e2ce
set -g status-left-style fg=#242424,bg=#f2e2ce
set -g status-right-style fg=#7a7062,bg=#f2e2ce

# Window status
set-window-option -g window-status-style fg=#7a7062
set-window-option -g window-status-current-style fg=#242424,bold
set-window-option -g window-status-activity-style fg=#00a3e9,bold
set-window-option -g window-status-bell-style fg=#00a3e9,bold

# Pane borders
set -g pane-border-style fg=#7a7062
set -g pane-active-border-style fg=#242424

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#7a7062
set -g window-active-style fg=#2b2826

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#242424]●,#[fg=#7a7062]○}"

# Session switcher & copy mode
set -g mode-style fg=#242424,bg=#fdf0de

# Messages & command prompt - minimal style
set -g message-style fg=#00a3e9,bg=#f2e2ce,bold
set -g message-command-style fg=#242424,bg=#f2e2ce

# Display panes
set -g display-panes-active-colour "#242424"
set -g display-panes-colour "#7a7062"
