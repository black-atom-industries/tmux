# Theme: Black Atom — PAPER ∷ Blue Light
# Appearance: light
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#32669a,bg=#eff2f6
set -g status-left-style fg=#002469,bg=#eff2f6
set -g status-right-style fg=#32669a,bg=#eff2f6

# Window status
set-window-option -g window-status-style fg=#32669a
set-window-option -g window-status-current-style fg=#002469,bold
set-window-option -g window-status-activity-style fg=#00a3e9,bold
set-window-option -g window-status-bell-style fg=#00a3e9,bold

# Pane borders
set -g pane-border-style fg=#32669a
set -g pane-active-border-style fg=#002469

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#32669a
set -g window-active-style fg=#002469

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#002469]●,#[fg=#32669a]○}"

# Session switcher & copy mode
set -g mode-style fg=#002469,bg=#fafcfe

# Messages & command prompt - minimal style
set -g message-style fg=#00a3e9,bg=#eff2f6,bold
set -g message-command-style fg=#002469,bg=#eff2f6

# Display panes
set -g display-panes-active-colour "#002469"
set -g display-panes-colour "#32669a"
