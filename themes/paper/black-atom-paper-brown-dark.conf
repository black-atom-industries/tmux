# Theme: Black Atom — PAPER ∷ Brown Dark
# Appearance: dark
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#9b9082,bg=#211f1c
set -g status-left-style fg=#e5ddd0,bg=#211f1c
set -g status-right-style fg=#9b9082,bg=#211f1c

# Window status
set-window-option -g window-status-style fg=#9b9082
set-window-option -g window-status-current-style fg=#e5ddd0,bold
set-window-option -g window-status-activity-style fg=#79b5cc,bold
set-window-option -g window-status-bell-style fg=#79b5cc,bold

# Pane borders
set -g pane-border-style fg=#9b9082
set -g pane-active-border-style fg=#e5ddd0

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#9b9082
set -g window-active-style fg=#e8dccc

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#e5ddd0]●,#[fg=#9b9082]○}"

# Session switcher & copy mode
set -g mode-style fg=#e5ddd0,bg=#37322c

# Messages & command prompt - minimal style
set -g message-style fg=#79b5cc,bg=#211f1c,bold
set -g message-command-style fg=#e5ddd0,bg=#211f1c

# Display panes
set -g display-panes-active-colour "#e5ddd0"
set -g display-panes-colour "#9b9082"
