# Theme: Black Atom — PAPER ∷ Blue Dark
# Appearance: dark
# Collection: MNML (Minimal)

# Status bar
set -g status-style fg=#839caf,bg=#002b51
set -g status-left-style fg=#f2f6f9,bg=#002b51
set -g status-right-style fg=#839caf,bg=#002b51

# Window status
set-window-option -g window-status-style fg=#839caf
set-window-option -g window-status-current-style fg=#f2f6f9,bold
set-window-option -g window-status-activity-style fg=#79b5cc,bold
set-window-option -g window-status-bell-style fg=#79b5cc,bold

# Pane borders
set -g pane-border-style fg=#839caf
set -g pane-active-border-style fg=#f2f6f9

# Pane foreground (inactive panes dimmed)
set -g window-style fg=#839caf
set -g window-active-style fg=#eef2f5

# Pane status bar
set -g pane-border-format "#{?pane_active,#[fg=#f2f6f9]●,#[fg=#839caf]○}"

# Session switcher & copy mode
set -g mode-style fg=#f2f6f9,bg=#053b5e

# Messages & command prompt - minimal style
set -g message-style fg=#79b5cc,bg=#002b51,bold
set -g message-command-style fg=#f2f6f9,bg=#002b51

# Display panes
set -g display-panes-active-colour "#f2f6f9"
set -g display-panes-colour "#839caf"
